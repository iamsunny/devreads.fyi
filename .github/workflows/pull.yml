name: Pull feeds and deploy

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pull-and-deploy
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    env:
      HAS_CLOUDFLARE: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Ingest feeds
        run: node ingest/run.mjs --concurrency 12
      - name: Commit updated data
        run: |
          git config user.name "feed-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add data sites.yml
          git diff --cached --quiet || git commit -m "data: scheduled pull $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
      - name: Build site + search index
        env:
          SITE_URL: https://devreads.fyi
        run: npm run build
      # Direct upload instead of a git-connected Pages project: scheduled data
      # commits (~1,440/month) would blow past the 500 builds/month free-tier
      # limit, while wrangler deploys don't count against it.
      - name: Deploy to Cloudflare Pages
        if: env.HAS_CLOUDFLARE == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=devreads --branch=main
