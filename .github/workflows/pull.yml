name: Pull feeds

# Ingests feeds and commits new posts. The site itself is built and deployed
# by Cloudflare Pages (git-connected): every data commit pushed here triggers
# a Pages build. Cadence is every 2 hours to stay inside the Pages free tier
# of 500 builds/month (~360 data commits + code pushes + PR previews).

on:
  schedule:
    - cron: '7 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pull
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Ingest feeds
        run: node ingest/run.mjs --concurrency 12
      - name: Commit updated data
        run: |
          git config user.name "feed-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data sites.yml
          git diff --cached --quiet || git commit -m "data: scheduled pull $(date -u +'%Y-%m-%dT%H:%MZ')"
          git pull --rebase
          git push
