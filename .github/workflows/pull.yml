name: Pull feeds

# Ingests feeds and commits new posts. The site itself is built and deployed
# by Cloudflare (git-connected): every data commit pushed here triggers a
# build. Cadence is every 6 hours, plus an immediate run whenever sites.yml
# changes on main, so newly merged sites backfill right away and removed
# sites are pruned right away (the ingest prunes orphans automatically).

on:
  schedule:
    - cron: '7 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - sites.yml

permissions:
  contents: write

concurrency:
  group: pull
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Ingest feeds
        run: node ingest/run.mjs --concurrency 12
      - name: Commit updated data
        run: |
          git config user.name "Sunny Sharma"
          git config user.email "2724486+iamsunny@users.noreply.github.com"
          git add data sites.yml
          git diff --cached --quiet || git commit -m "data: scheduled pull $(date -u +'%Y-%m-%dT%H:%MZ')"
          git pull --rebase
          git push
